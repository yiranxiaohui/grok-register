name: Build and Push Image

# 只在打 git tag（如 v1.0.0）时构建并推送到 GHCR。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}  # 也允许手动在 Actions 页面触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/grok-register

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推 GHCR 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 前端产物不入库，CI 里现构建。产物写到 src/static/admin/，随后被镜像 COPY 进去。
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build web frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Verify frontend artifacts
        run: |
          test -f src/static/admin/accounts.html || { echo "missing accounts.html"; exit 1; }
          ls src/static/admin/assets/*.js >/dev/null 2>&1 || { echo "missing built assets"; exit 1; }
          grep -q 'window.__ADMIN_BASE__ = window.__ADMIN_BASE__ || "/admin";' \
            src/static/admin/accounts.html || { echo "admin-base injection line missing"; exit 1; }

      # 多架构：arm64 通过 QEMU 模拟构建。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # 构建上下文是 src/：Dockerfile 的 COPY 路径（requirements.txt、
      # turnstile-solver/、entrypoint.sh 等）都相对 src/ 根。
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 镜像已推送 🐳" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
