services:
    register-lite:
      image: ghcr.io/yiranxiaohui/grok-register:latest
      container_name: grok-register-lite
      # 全部配置读自 .env（改配置 = 改 .env 后 `docker compose up -d` 重启生效）。
      env_file:
        - .env
      ports:
        # 左边宿主机端口来自 .env 的 GROK_REGISTER_LITE_PORT；右边容器内固定 8788。
        - "${GROK_REGISTER_LITE_PORT:-8788}:8788"
      shm_size: "1gb"
      security_opt:
        - seccomp:unconfined
      volumes:
        - ${GROK_REGISTER_HOST_DATA_DIR:-./data}:/data
      environment:
        # 容器内应用固定监听 8788（不随 .env 的宿主机端口变化，否则端口映射会错位）。
        GROK_REGISTER_LITE_PORT: "8788"
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8788${GROK_REGISTER_ADMIN_BASE_PATH:-/admin}/api/session"]
        interval: 30s
        timeout: 5s
        start_period: 90s
        retries: 5
